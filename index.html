<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Reacture Portfolio</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, sans-serif;
            background: #0D1117;
            color: #f0f6fc;
            min-height: 100vh;
        }

        #splash {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0D1117;
            gap: 16px;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }

        #splash.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #splash-title {
            font-family: monospace;
            font-size: 22px;
            color: #67e8f9;
            letter-spacing: 0.08em;
        }

        #splash-sub {
            font-family: monospace;
            font-size: 12px;
            color: #8b949e;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(103, 232, 249, 0.2);
            border-top-color: #67e8f9;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #root {
            min-height: 100vh;
        }

        #error-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: #0D1117;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
            padding: 32px;
            text-align: center;
            z-index: 99999;
        }

        #error-overlay.visible {
            display: flex;
        }

        #error-title {
            font-family: monospace;
            font-size: 18px;
            color: #f85149;
        }

        #error-message {
            font-family: monospace;
            font-size: 12px;
            color: #8b949e;
            max-width: 480px;
            white-space: pre-wrap;
            word-break: break-word;
            background: #161b22;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid #30363d;
            text-align: left;
        }
    </style>
</head>

<body>

    <div id="splash">
        <div class="spinner"></div>
        <div id="splash-title">Reacture</div>
        <div id="splash-sub">Loading your portfolio...</div>
    </div>

    <div id="error-overlay">
        <div id="error-title">⚠️ Runtime Error</div>
        <pre id="error-message"></pre>
    </div>

    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    function useTheme() {

const [theme, setTheme] = React.useState(

() => localStorage.getItem("theme") || "light"

);

React.useEffect(() => {

localStorage.setItem("theme", theme);

document.documentElement.style.background = 

  theme === "dark" ? "#1a1a1a" : "#ffffff";

}, [theme]);

return [theme, setTheme];

}

function useFormData() {

const [formData, setFormData] = React.useState({ name: "", message: "" });

};

return [formData, updateField];

// Header Component

function Header() {

return (

<header style={{ textAlign: "center", marginBottom: "32px", paddingBottom: "16px", borderBottom: "2px solid #ccc" }}>

  <h1 style={{ margin: "0 0 8px 0", fontSize: "32px" }}>Your Name</h1>

  <p style={{ margin: "0", fontSize: "18px", color: "#666" }}>Frontend Developer & React Enthusiast</p>

</header>

);

}

// About Section

function About(props) {

return (

<section style={{ marginBottom: "32px", padding: "16px", background: "#f5f7fb", borderRadius: "8px" }}>

  <h2 style={{ marginTop: "0" }}>About</h2>

  <p>{props.bio}</p>

  <p><strong>Current Status:</strong> <span style={{ color: "green" }}>● {props.status}</span></p>

</section>

);

}

// Projects Section with Filter

function Projects(props) {

const [filter, setFilter] = React.useState("All");

React.useEffect(() => {

document.title = `Portfolio | ${filter === "All" ? "All Projects" : filter}`;

}, [filter]);

const visible =

filter === "All" 

  ? props.projects 

  : props.projects.filter(p => p.type === filter);

const projectTypes = ["All", ...new Set(props.projects.map(p => p.type))];

return (

<section style={{ marginBottom: "32px", padding: "16px", background: "#f5f7fb", borderRadius: "8px" }}>

  <h2 style={{ marginTop: "0" }}>Projects ({visible.length})</h2>

  

  <div style={{ marginBottom: "16px", display: "flex", gap: "8px", flexWrap: "wrap" }}>

    {projectTypes.map(type => (

      <button

        key={type}

        onClick={() => setFilter(type)}

        style={{

          padding: "8px 16px",

          background: filter === type ? "#0066cc" : "#ddd",

          color: filter === type ? "#fff" : "#000",

          border: "none",

          borderRadius: "4px",

          cursor: "pointer",

          fontWeight: filter === type ? "bold" : "normal"

        }}

      >

        {type}

      </button>

    ))}

  </div>



  <ul style={{ margin: "0", paddingLeft: "20px" }}>

    {visible.map((project, index) => (

      <li key={project.id} style={{ marginBottom: "8px" }}>

        <strong>{project.name}</strong>

        <span style={{ color: "#666", fontSize: "14px" }}> • {project.type}</span>

        {project.description && <p style={{ margin: "4px 0 0 0", color: "#555" }}>{project.description}</p>}

      </li>

    ))}

  </ul>

</section>

);

}

// Contact Section with Refs & State

function Contact() {

const [open, setOpen] = React.useState(false);

const emailRef = React.useRef(null);

const [formData, updateField] = useFormData();

const handleFocusEmail = () => {

if (emailRef.current) {

  emailRef.current.focus();

  emailRef.current.select();

}

};

const handleSubmit = () => {

if (formData.name && formData.message) {

  alert(`Thanks ${formData.name}! I'll get back to you soon.`);

  updateField("name", "");

  updateField("message", "");

} else {

  alert("Please fill in all fields");

}

};

return (

<section style={{ marginBottom: "32px", padding: "16px", background: "#f5f7fb", borderRadius: "8px" }}>

  <h2 style={{ marginTop: "0" }}>Get In Touch</h2>

  

  <button

    onClick={() => setOpen(!open)}

    style={{

      padding: "10px 20px",

      background: "#0066cc",

      color: "#fff",

      border: "none",

      borderRadius: "4px",

      cursor: "pointer",

      fontSize: "16px"

    }}

  >

    {open ? "Hide Contact Form ✕" : "Show Contact Form ✉️"}

  </button>



  {open && (

    <div style={{ marginTop: "16px", padding: "16px", background: "#fff", borderRadius: "4px", border: "1px solid #ddd" }}>

      <div style={{ marginBottom: "12px" }}>

        <label style={{ display: "block", marginBottom: "4px", fontWeight: "bold" }}>Your Name:</label>

        <input

          type="text"

          placeholder="John Doe"

          value={formData.name}

          onChange={(e) => updateField("name", e.target.value)}

          style={{ width: "100%", padding: "8px", borderRadius: "4px", border: "1px solid #ccc", boxSizing: "border-box" }}

        />

      </div>



      <div style={{ marginBottom: "12px" }}>

        <label style={{ display: "block", marginBottom: "4px", fontWeight: "bold" }}>Your Message:</label>

        <textarea

          placeholder="Tell me about your project..."

          value={formData.message}

          onChange={(e) => updateField("message", e.target.value)}

          style={{ width: "100%", padding: "8px", borderRadius: "4px", border: "1px solid #ccc", minHeight: "100px", boxSizing: "border-box" }}

        />

      </div>



      <div style={{ marginBottom: "12px", padding: "12px", background: "#f0f0f0", borderRadius: "4px" }}>

        <label style={{ display: "block", marginBottom: "8px", fontWeight: "bold" }}>📧 Direct Email:</label>

        <div style={{ display: "flex", gap: "8px" }}>

          <input

            ref={emailRef}

            type="email"

            defaultValue="yourname@example.com"

            readOnly

            style={{ flex: 1, padding: "8px", borderRadius: "4px", border: "1px solid #ccc" }}

          />

          <button

            onClick={handleFocusEmail}

            style={{

              padding: "8px 16px",

              background: "#666",

              color: "#fff",

              border: "none",

              borderRadius: "4px",

              cursor: "pointer"

            }}

          >

            Copy

          </button>

        </div>

      </div>



      <button

        onClick={handleSubmit}

        style={{

          padding: "10px 20px",

          background: "#28a745",

          color: "#fff",

          border: "none",

          borderRadius: "4px",

          cursor: "pointer",

          fontSize: "16px",

          fontWeight: "bold"

        }}

      >

        Send Message 🚀

      </button>

    </div>

  )}

</section>

);

}

                var root = document.getElementById('root');
                var splash = document.getElementById('splash');
                if (root && root.children.length > 0) {
                    splash.classList.add('hidden');
                    setTimeout(function () { if (splash.parentNode) splash.parentNode.removeChild(splash); }, 500);
                } else {
                    setTimeout(hideSplash, 100);
                }
            }

            window.addEventListener('error', function (event) {
                document.getElementById('splash').classList.add('hidden');
                var overlay = document.getElementById('error-overlay');
                overlay.classList.add('visible');
                document.getElementById('error-message').textContent =
                    (event.error && event.error.message) || String(event.message || event);
            });

            window.addEventListener('load', function () { setTimeout(hideSplash, 300); });
        })();
    </script>

</body>

</html>
